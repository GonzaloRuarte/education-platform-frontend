services:
  db:
    image: postgres:alpine
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    env_file: ../meta-backend/.env
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:alpine
    command: >
      sh -c 'if [ -n "$$REDIS_PASSWORD" ]; then
        exec redis-server --requirepass "$$REDIS_PASSWORD";
      else
        exec redis-server;
      fi'
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    env_file: ../meta-backend/.env
    healthcheck:
      test: ["CMD-SHELL", "if [ -n \"$$REDIS_PASSWORD\" ]; then redis-cli -a \"$$REDIS_PASSWORD\" ping; else redis-cli ping; fi"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ../meta-backend
      dockerfile: Dockerfile
      args :
        INSTALL_DEV: "true"
    command: |
      sh -lc '
        set -eu
        python manage.py migrate
        if [ "$${DEV_BOOTSTRAP_ADMIN:-1}" = "1" ]; then
          python manage.py bootstrap_db_admin \
            --username "$${DEV_ADMIN_USER:-admin}" \
            --password "$${DEV_ADMIN_PASSWORD:-admin-change-me}" \
            --email "$${DEV_ADMIN_EMAIL:-admin@example.local}" \
            --no-input
        fi
        if [ "$${DEV_SEED_DEMO_DATA:-1}" = "1" ]; then
          seed_args="--no-input"
          if [ "$${DEV_SEED_DEMO_RESET:-0}" = "1" ]; then
            seed_args="--reset --no-input"
          fi
          python manage.py seed_cold_start_demo_data $$seed_args
        fi
        python manage.py runserver 0.0.0.0:8000
      '
    volumes:
      - ../meta-backend:/application
    env_file: ../meta-backend/.env
    environment:
      POSTGRES_HOST: db
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend-dev:
    build:
      context: ../meta-frontend
      dockerfile: Dockerfile
      target: runner
    environment:
      API_BASE_URL: http://localhost:8000/api
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
