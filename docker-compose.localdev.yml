services:
  # ── infrastructure ─────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    env_file: ../meta-backend/.env
    volumes: ["pgdata:/var/lib/postgresql/data"]

  redis:
    image: redis:7-alpine
    command: sh -c 'exec redis-server --requirepass "$REDIS_PASSWORD"'
    ports:
      - "${REDIS_PORT:-6379}:6379"
    env_file: ../meta-backend/.env

  # ── Django API ─────────────────────────────────────────────────
  backend:
    build:
      context: ../meta-backend
      dockerfile: Dockerfile.pre_staging
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ../meta-backend:/app          # live-reload code on save
    env_file: ../meta-backend/.env
    environment:
      # override ONLY the hostnames (because inside Docker, localhost != your machine)
      POSTGRES_HOST: db
      REDIS_HOST: redis

      # optional, but keep it here if you like:
      DJANGO_EMAIL_BACKEND: django.core.mail.backends.console.EmailBackend
    ports: ["8000:8000"]
    depends_on: [db, redis]

  # ── React hot-reload server (optional) ─────────────────────────
  frontend-dev:
    build:
      context: ../meta-frontend
      dockerfile: Dockerfile.pre_staging-local_test
      target: runner
    environment:
      PORT: 3000
      HOSTNAME: 0.0.0.0
      NEXT_PUBLIC_API_BASE_PATH: http://backend:8000/api
      NEXT_PUBLIC_APPOINTMENT_SCHEDULE_PROFILE: expanded_6_blocks
    ports:
      - "3000:3000"
    depends_on: [backend]

volumes:
  pgdata:
