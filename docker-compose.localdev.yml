services:
  db:
    image: postgres:18-alpine
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    env_file: ../meta-backend/.env
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    command: >
      sh -c 'if [ -n "$$REDIS_PASSWORD" ]; then
        exec redis-server --requirepass "$$REDIS_PASSWORD";
      else
        exec redis-server;
      fi'
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    env_file: ../meta-backend/.env
    healthcheck:
      test: ["CMD-SHELL", "if [ -n \"$$REDIS_PASSWORD\" ]; then redis-cli -a \"$$REDIS_PASSWORD\" ping; else redis-cli ping; fi"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ../meta-backend
      dockerfile: Dockerfile
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ../meta-backend:/application
    env_file: ../meta-backend/.env
    environment:
      POSTGRES_HOST: db
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend-dev:
    build:
      context: ../meta-frontend
      dockerfile: Dockerfile.pre_staging-local_test
      target: runner
    environment:
      API_BASE_URL: http://localhost:8000/api
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
