name: Production Auto Deploy - MetaApp-Web

on:
  push:
    branches:
      - production
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies and build
        run: |
          pnpm install
          pnpm run build

      - name: Prepare standalone build for deployment
        run: |
          mkdir -p release

          # Copy standalone output
          cp -r .next/standalone/* release/

          # Conditionally copy .next/static if it exists
          if [ -d ".next/static" ]; then
            mkdir -p release/.next
            cp -r .next/static release/.next/static
          fi

          # Conditionally copy public folder if it exists
          if [ -d "public" ]; then
            cp -r public release/public
          fi

          # Conditionally copy server.js if it exists
          if [ -f "server.js" ]; then
            cp server.js release/server.js
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: release

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'Production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: .

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'MetaApp-Website'
          slot-name: 'Production'
          package: .
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_4975FA1D14654DA384E94A6FFD5C4E8C }}
