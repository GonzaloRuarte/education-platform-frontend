server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Browser ES module imports must resolve to exact files. This app now emits
    # .js import specifiers, but the .js fallback keeps older cached app.js files
    # and accidental extensionless imports from failing with nginx 404s.
    location /assets/ {
        try_files $uri $uri.js =404;
    }

    # If a browser has an old service worker registration, serve the cleanup file
    # instead of logging repeated 404s for /sw.js.
    location = /sw.js {
        add_header Cache-Control "no-store";
        try_files $uri =204;
    }

    # Allow deep links / hashless routes to land on the static shell.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
